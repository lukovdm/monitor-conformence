- type: LearningExperiment
  name: icy-driving
  file:
    - tests/icy-driving/icy-driving.pm
  parameters:
    - constants: "IMAX=25"
    - constants: "IMAX=50"
  horizon:
    - 10
    - 25
  spec: Pmax=? [F<=1 "crash"]
  good_label: crash
  loader: pomdp
  use_exact: true
  use_dont_care: [true, false]
  use_refrence_language: [true, false]

