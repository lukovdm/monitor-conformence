- type: LearningExperiment
  name: icy-driving
  file:
    - experiments/icy-driving/icy-driving.pm
  parameters:
    - constants: "IMAX=1"
    - constants: "IMAX=25"
    - constants: "IMAX=50"
  horizon:
    - 3
    - 10
    - 25
  spec: Pmax=? [F<=1 "crash"]
  good_label: crash
  loader: pomdp
  learning_algs:
    - [verimon]
  learning_method: lsharp
  slack:
    - [0, 0]
    - [0.2, 0.05]
  use_exact: true

