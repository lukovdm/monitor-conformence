- name: snakes_ladders
  type: LearningExperiment
  file: experiments/snake_ladder/mc_u_nxn.pm
  parameters:
    n: 100
    ladders:
      1: 38
      4: 14
      9: 31
      28: 64
      40: 42
      36: 44
      51: 67
      71: 91
      80: 100
    snakes:
      98: 76
      95: 75
      93: 73
      87: 24
      64: 60
      62: 19
      55: 53
      49: 11
      47: 26
      16: 6
  spec: Pmax=? [F<5 "good"]
  good_label: good
  loader: snakes_ladders
  horizon:
    - 9
    - 10
    - 11
    - 12
  use_horizon_in_filtering:
    - true
  learning_algs:
    - [verimon]
  learning_method: lsharp
  slack:
    - [0, 0]
    - [0.2, 0.05]
  use_exact: true
