- type: LearningExperiment
  name: evade
  file: tests/premise/evade-monitoring.nm
  parameters:
    constants: "N=4,RADIUS=2"
  spec: Pmax=? [F<=3 "crash"]
  good_label: crash
  loader: pomdp
  horizon:
    - 8
    - 9
  learning_algs: 
    - [verimon]
  l_variant:
    - L*
    - L#
  slack:
    - [0.2, 0.05]
  use_exact: true

- type: LearningExperiment
  name: airport
  file:
    - tests/premise/airportA-3.nm
    - tests/premise/airportB-3.nm
    - tests/premise/airportA-7.nm
    - tests/premise/airportB-7.nm
  parameters:
    - constants: "DMAX=3,PMAX=3"
    - constants: "DMAX=4,PMAX=4"
  spec: Pmax=? [F<=2 "crash"]
