- type: LearningExperiment
  name: icy-driving
  file:
    - tests/icy-driving/icy-driving.pm
  parameters:
    - constants: "IMAX=1"
    - constants: "IMAX=25"
  horizon:
    - 3
    - 10
  spec: Pmax=? [F<=1 "crash"]
  good_label: crash
  loader: pomdp
  learning_algs: 
    - [verimon]
  l_variant:
    - L#
    - L*
  slack:
    - [0.2, 0.05]
  use_exact: true

